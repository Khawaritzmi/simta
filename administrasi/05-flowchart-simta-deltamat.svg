<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Flowchart Sistem SIMTA dan DELTA-MAT</title>
  <desc id="desc">Diagram alur kerja aplikasi SIMTA, termasuk login pengguna, modul tugas akhir, modul bimbingan PA, dan fitur DELTA-MAT.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f91e8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16855b"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c56a14"/>
    </marker>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#252b36" flood-opacity="0.10"/>
    </filter>
    <style>
      .page { fill: #f5f7fc; }
      .title { fill: #252b36; font: 800 36px Inter, Arial, sans-serif; letter-spacing: 2px; }
      .subtitle { fill: #68707d; font: 500 18px Inter, Arial, sans-serif; }
      .section-title { fill: #252b36; font: 800 20px Inter, Arial, sans-serif; }
      .box-title { fill: #252b36; font: 800 17px Inter, Arial, sans-serif; }
      .box-text { fill: #596273; font: 600 13px Inter, Arial, sans-serif; }
      .small-text { fill: #68707d; font: 600 12px Inter, Arial, sans-serif; }
      .lane { fill: #ffffff; stroke: #dfe7ef; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .box { fill: #ffffff; stroke: #dfe7ef; stroke-width: 1.5; rx: 10; filter: url(#shadow); }
      .box-blue { fill: #eef6ff; stroke: #1f91e8; }
      .box-green { fill: #ecfdf5; stroke: #16855b; }
      .box-orange { fill: #fff7ed; stroke: #c56a14; }
      .box-red { fill: #fff1f2; stroke: #ef4b4b; }
      .box-gray { fill: #f8fafc; stroke: #cbd5e1; }
      .pill-blue { fill: #1f91e8; }
      .pill-green { fill: #16855b; }
      .pill-orange { fill: #c56a14; }
      .pill-red { fill: #ef4b4b; }
      .pill-text { fill: #ffffff; font: 800 12px Inter, Arial, sans-serif; }
      .arrow-blue { fill: none; stroke: #1f91e8; stroke-width: 3; marker-end: url(#arrow-blue); }
      .arrow-green { fill: none; stroke: #16855b; stroke-width: 3; marker-end: url(#arrow-green); }
      .arrow-orange { fill: none; stroke: #c56a14; stroke-width: 3; marker-end: url(#arrow-orange); }
      .arrow-muted { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrow-blue); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="page" width="1400" height="980"/>

  <text class="title" x="700" y="58" text-anchor="middle">FLOWCHART SISTEM SIMTA</text>
  <text class="subtitle" x="700" y="90" text-anchor="middle">Sistem Informasi Manajemen Tugas Akhir dengan fitur DELTA-MAT</text>

  <rect class="lane" x="52" y="132" width="1296" height="152"/>
  <text class="section-title" x="82" y="168">1. Akses Awal Pengguna</text>

  <rect class="box box-blue" x="90" y="190" width="180" height="64"/>
  <text class="box-title" x="180" y="216" text-anchor="middle">Pengguna</text>
  <text class="box-text" x="180" y="238" text-anchor="middle">Mahasiswa, dosen, admin</text>

  <path class="arrow-blue" d="M 270 222 H 332"/>

  <rect class="box box-gray" x="340" y="184" width="210" height="76"/>
  <text class="box-title" x="445" y="212" text-anchor="middle">Landing SIMTA</text>
  <text class="box-text" x="445" y="234" text-anchor="middle">Pilih layanan aplikasi</text>

  <path class="arrow-blue" d="M 550 222 H 612"/>

  <rect class="box box-gray" x="620" y="184" width="220" height="76"/>
  <text class="box-title" x="730" y="212" text-anchor="middle">Pilih Modul</text>
  <text class="box-text" x="730" y="234" text-anchor="middle">TA, PA, atau DELTA-MAT</text>

  <path class="arrow-blue" d="M 840 222 H 902"/>

  <rect class="box box-orange" x="910" y="184" width="188" height="76"/>
  <text class="box-title" x="1004" y="212" text-anchor="middle">Autentikasi</text>
  <text class="box-text" x="1004" y="234" text-anchor="middle">Login sesuai peran</text>

  <path class="arrow-blue" d="M 1098 222 H 1160"/>

  <rect class="box box-green" x="1168" y="184" width="140" height="76"/>
  <text class="box-title" x="1238" y="212" text-anchor="middle">Dashboard</text>
  <text class="box-text" x="1238" y="234" text-anchor="middle">Akses fitur</text>

  <rect class="lane" x="52" y="322" width="618" height="330"/>
  <text class="section-title" x="82" y="358">2. Alur Mahasiswa dan Dosen</text>

  <rect class="box box-green" x="90" y="392" width="210" height="78"/>
  <text class="box-title" x="195" y="420" text-anchor="middle">Mahasiswa</text>
  <text class="box-text" x="195" y="442" text-anchor="middle">Melihat profil, bimbingan,</text>
  <text class="box-text" x="195" y="460" text-anchor="middle">repository, dan Q&amp;A</text>

  <rect class="box box-blue" x="420" y="392" width="210" height="78"/>
  <text class="box-title" x="525" y="420" text-anchor="middle">Dosen</text>
  <text class="box-text" x="525" y="442" text-anchor="middle">Memantau bimbingan,</text>
  <text class="box-text" x="525" y="460" text-anchor="middle">approval, seminar, Q&amp;A</text>

  <path class="arrow-green" d="M 300 431 H 412"/>

  <rect class="box box-gray" x="90" y="522" width="210" height="82"/>
  <text class="box-title" x="195" y="550" text-anchor="middle">Bimbingan TA</text>
  <text class="box-text" x="195" y="572" text-anchor="middle">Progress, catatan,</text>
  <text class="box-text" x="195" y="590" text-anchor="middle">seminar, repository</text>

  <rect class="box box-gray" x="420" y="522" width="210" height="82"/>
  <text class="box-title" x="525" y="550" text-anchor="middle">Bimbingan PA</text>
  <text class="box-text" x="525" y="572" text-anchor="middle">Konsultasi akademik,</text>
  <text class="box-text" x="525" y="590" text-anchor="middle">IPK, SKS, rekomendasi</text>

  <path class="arrow-green" d="M 195 470 V 514"/>
  <path class="arrow-blue" d="M 525 470 V 514"/>
  <path class="arrow-muted" d="M 300 563 H 412"/>

  <rect class="lane" x="730" y="322" width="618" height="330"/>
  <text class="section-title" x="760" y="358">3. Alur DELTA-MAT untuk Mahasiswa dan Publik</text>

  <rect class="box box-blue" x="768" y="392" width="198" height="78"/>
  <text class="box-title" x="867" y="420" text-anchor="middle">Buka DELTA-MAT</text>
  <text class="box-text" x="867" y="442" text-anchor="middle">Akses halaman</text>
  <text class="box-text" x="867" y="460" text-anchor="middle">/database-ta</text>

  <path class="arrow-blue" d="M 966 431 H 1018"/>

  <rect class="box box-gray" x="1026" y="392" width="126" height="78"/>
  <text class="box-title" x="1089" y="420" text-anchor="middle">Cari Judul</text>
  <text class="box-text" x="1089" y="442" text-anchor="middle">Input kata</text>
  <text class="box-text" x="1089" y="460" text-anchor="middle">kunci</text>

  <path class="arrow-blue" d="M 1152 431 H 1204"/>

  <rect class="box box-orange" x="1212" y="392" width="98" height="78"/>
  <text class="box-title" x="1261" y="420" text-anchor="middle">Skor</text>
  <text class="box-text" x="1261" y="442" text-anchor="middle">Analisis</text>
  <text class="box-text" x="1261" y="460" text-anchor="middle">kemiripan</text>

  <rect class="box box-gray" x="768" y="522" width="170" height="82"/>
  <text class="box-title" x="853" y="550" text-anchor="middle">Rekomendasi</text>
  <text class="box-text" x="853" y="572" text-anchor="middle">Daftar judul</text>
  <text class="box-text" x="853" y="590" text-anchor="middle">paling relevan</text>

  <path class="arrow-blue" d="M 1261 470 V 492 C 1261 512 1248 522 1228 522 H 946"/>

  <rect class="box box-green" x="986" y="522" width="160" height="82"/>
  <text class="box-title" x="1066" y="550" text-anchor="middle">Detail Item</text>
  <text class="box-text" x="1066" y="572" text-anchor="middle">Mahasiswa, NIM,</text>
  <text class="box-text" x="1066" y="590" text-anchor="middle">pembimbing</text>

  <path class="arrow-green" d="M 938 563 H 978"/>

  <rect class="box box-green" x="1194" y="522" width="116" height="82"/>
  <text class="box-title" x="1252" y="550" text-anchor="middle">PDF</text>
  <text class="box-text" x="1252" y="572" text-anchor="middle">Preview</text>
  <text class="box-text" x="1252" y="590" text-anchor="middle">dokumen</text>

  <path class="arrow-green" d="M 1146 563 H 1186"/>

  <rect class="lane" x="52" y="690" width="1296" height="230"/>
  <text class="section-title" x="82" y="726">4. Alur Admin dan Basis Data DELTA-MAT</text>

  <rect class="box box-orange" x="90" y="760" width="168" height="82"/>
  <text class="box-title" x="174" y="788" text-anchor="middle">Admin</text>
  <text class="box-text" x="174" y="810" text-anchor="middle">Login dan kelola</text>
  <text class="box-text" x="174" y="828" text-anchor="middle">data sistem</text>

  <path class="arrow-orange" d="M 258 801 H 320"/>

  <rect class="box box-orange" x="328" y="760" width="178" height="82"/>
  <text class="box-title" x="417" y="788" text-anchor="middle">Kelola DELTA-MAT</text>
  <text class="box-text" x="417" y="810" text-anchor="middle">Tambah, edit,</text>
  <text class="box-text" x="417" y="828" text-anchor="middle">hapus, cari data</text>

  <path class="arrow-orange" d="M 506 801 H 568"/>

  <rect class="box box-blue" x="576" y="760" width="168" height="82"/>
  <text class="box-title" x="660" y="788" text-anchor="middle">Import Excel</text>
  <text class="box-text" x="660" y="810" text-anchor="middle">Matematika dan</text>
  <text class="box-text" x="660" y="828" text-anchor="middle">Pendidikan Matematika</text>

  <path class="arrow-blue" d="M 744 801 H 806"/>

  <rect class="box box-gray" x="814" y="760" width="190" height="82"/>
  <text class="box-title" x="909" y="788" text-anchor="middle">Database</text>
  <text class="box-text" x="909" y="810" text-anchor="middle">thesis_title_databases</text>
  <text class="box-text" x="909" y="828" text-anchor="middle">judul, NIM, dokumen</text>

  <path class="arrow-green" d="M 1004 801 H 1066"/>

  <rect class="box box-green" x="1074" y="760" width="234" height="82"/>
  <text class="box-title" x="1191" y="788" text-anchor="middle">Data Tampil di Publik</text>
  <text class="box-text" x="1191" y="810" text-anchor="middle">Pencarian, rekomendasi,</text>
  <text class="box-text" x="1191" y="828" text-anchor="middle">detail, preview PDF</text>

  <path class="arrow-muted" d="M 909 760 V 650"/>
  <path class="arrow-muted" d="M 909 650 H 1040 V 604"/>

  <rect x="82" y="878" width="102" height="26" rx="13" class="pill-blue"/>
  <text x="133" y="896" text-anchor="middle" class="pill-text">Pengguna</text>
  <rect x="198" y="878" width="84" height="26" rx="13" class="pill-green"/>
  <text x="240" y="896" text-anchor="middle" class="pill-text">Fitur</text>
  <rect x="296" y="878" width="88" height="26" rx="13" class="pill-orange"/>
  <text x="340" y="896" text-anchor="middle" class="pill-text">Admin</text>
  <rect x="398" y="878" width="96" height="26" rx="13" class="pill-red"/>
  <text x="446" y="896" text-anchor="middle" class="pill-text">Validasi</text>
  <text class="small-text" x="514" y="896">Arah panah menunjukkan perpindahan proses dan aliran data di SIMTA.</text>
</svg>
